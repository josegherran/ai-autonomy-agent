# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.11/yaml.schema.json
# ATK lifecycle configuration — local development environment
# Declarative agents have no backend service; local config only packages and sideloads.

version: v1.11

environmentFolderPath: ./env

provision:
  # Create a local-debug variant of the Teams app (avoids overwriting dev registration)
  - uses: teamsApp/create
    with:
      name: ${{TEAMS_APP_NAME}}-local-debug
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Package with local env var values
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.local.zip
      outputFolder: ./appPackage/build

  # Sideload the package into Teams for local testing
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.local.zip

deploy:
  # No backend to deploy for a pure declarative agent.
  # This stage is intentionally empty; extend here if you add an API plugin later.
  - uses: script
    with:
      run: echo "Declarative agent — no backend deploy step required."
